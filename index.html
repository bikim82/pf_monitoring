<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>아이 PF Monitor</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg0:#07090f;--bg1:#0d1117;--bg2:#161b22;--bg3:#1c2230;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --green:#3fb950;--red:#f85149;--amber:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;
  --font:'Pretendard',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:var(--font)}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px}
.pin-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 40px;text-align:center;width:100%;max-width:310px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s;display:inline-block;margin:0 6px}
.pin-dot.filled{background:var(--blue);border-color:var(--blue);box-shadow:0 0 8px #58a6ff44}
.numkey{padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-family:var(--mono);font-size:18px;font-weight:600;cursor:pointer;transition:all .1s;width:100%}
.numkey:hover{background:var(--bg2);border-color:var(--border2)}
.numkey:active{transform:scale(.95)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998}
.lbar-wrap{width:260px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:20px 0 10px}
.lbar{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .3s}

/* Header */
.hdr{padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg1);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:wrap}
.logo{font-size:12px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:7px}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
.rbtn{padding:5px 13px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--t2);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.rbtn:hover{background:var(--bg3);color:var(--t1)}
.rbtn:disabled{opacity:.4}

/* Alerts */
.alerts{padding:6px 18px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border);min-height:34px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.pill.gc{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);color:var(--green)}
.pill.dc{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:var(--red)}
.pill.ca{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);color:var(--blue)}
.pill.cb{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:var(--red)}
.pill.nh{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.2);color:var(--amber)}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;padding:12px 18px;border-bottom:1px solid var(--border)}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.slbl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.sval{font-size:15px;font-weight:700;font-family:var(--mono)}

/* Table */
.tbl-wrap{padding:12px 18px 60px}
.tbl-inner{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
th{padding:9px 11px;color:var(--t3);font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
th:first-child,th:nth-child(2){text-align:left}
td{padding:10px 11px;border-bottom:1px solid rgba(255,255,255,.025);text-align:right;vertical-align:middle}
td:first-child{text-align:left;position:sticky;left:0;background:var(--bg1);z-index:2}
th:first-child{text-align:left;position:sticky;left:0;background:var(--bg2);z-index:3}
tbody tr:hover td:first-child{background:var(--bg3)}
td:nth-child(2){text-align:left}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--bg3)}

.tk-row{display:flex;align-items:center;gap:8px}
.tk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tk-name{font-weight:700;font-size:12.5px}
.tk-sub{font-size:9.5px;color:var(--t3);margin-top:1px}

.sig{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono)}
.sig.a{background:rgba(63,185,80,.12);color:var(--green)}
.sig.b{background:rgba(248,81,73,.12);color:var(--red)}
.sig.n{background:rgba(210,153,34,.1);color:var(--amber)}
.sig.x{background:rgba(72,79,88,.15);color:var(--t3)}

.cloud{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:700}
.cloud.a{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.cloud.i{background:rgba(210,153,34,.08);color:var(--amber);border:1px solid rgba(210,153,34,.18)}
.cloud.b{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.2)}

.rbar{width:64px;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.rbar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple))}
.rs{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-family:var(--mono);font-weight:700;font-size:12px;border:2px solid}
.rs.l{background:rgba(63,185,80,.08);color:var(--green);border-color:rgba(63,185,80,.25)}
.rs.m{background:rgba(210,153,34,.08);color:var(--amber);border-color:rgba(210,153,34,.25)}
.rs.h{background:rgba(248,81,73,.08);color:var(--red);border-color:rgba(248,81,73,.25)}

/* Detail */
.detail{display:none;position:fixed;inset:0;background:var(--bg0);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dh{padding:11px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg1);position:sticky;top:0;flex-wrap:wrap}
.back{padding:5px 13px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--t2);font:600 11px var(--font);cursor:pointer}
.back:hover{background:var(--bg3);color:var(--t1)}
.db{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 60px)}
.dchart{padding:14px 18px;border-right:1px solid var(--border)}
.chart-box{width:100%;height:420px;border-radius:8px;overflow:hidden;background:var(--bg1)}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.leg{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--t2)}
.leg-l{width:14px;height:2px;border-radius:1px}
.leg-a{width:14px;height:7px;border-radius:2px;opacity:.7}
.dinfo{padding:14px 16px;overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 100px);-webkit-overflow-scrolling:touch}
.dsec{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 7px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.cardlbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.cardval{font-size:12.5px;font-weight:600;font-family:var(--mono)}
.ib-row{padding:8px 10px;background:var(--bg2);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--border)}
.ib-row.up{border-color:var(--green)}
.ib-row.dn{border-color:var(--red)}
.ib-row.mt{border-color:var(--t3)}
.news-a{display:block;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;text-decoration:none;transition:all .12s}
.news-a:hover{background:var(--bg3);border-color:var(--border2)}
.ntitle{font-size:11.5px;line-height:1.5;color:var(--t1);margin-bottom:3px}
.nmeta{font-size:9.5px;color:var(--t3);font-family:var(--mono)}
.tgt-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;position:relative;margin:6px 0}
.tgt-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green))}
.tgt-mark{position:absolute;top:-5px;width:3px;height:14px;border-radius:2px;background:var(--t1);transform:translateX(-50%)}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.earn-box{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px}
@media(max-width:720px){.db{grid-template-columns:1fr}.dchart{border-right:none;border-bottom:1px solid var(--border)}.dinfo{max-height:none}}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div style="font-size:11px;font-weight:700;letter-spacing:3px;color:var(--blue);margin-bottom:36px;display:flex;align-items:center;gap:8px">
    <span style="width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);display:inline-block"></span>아이 PF Monitor
  </div>
  <div class="pin-box">
    <div style="font-size:22px;margin-bottom:8px">🔒</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">PIN 입력</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:22px">4자리 PIN을 입력해주세요</div>
    <div style="margin-bottom:22px" id="pin-dots">
      <span class="pin-dot"></span><span class="pin-dot"></span>
      <span class="pin-dot"></span><span class="pin-dot"></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <button class="numkey" onclick="pi('1')">1</button><button class="numkey" onclick="pi('2')">2</button><button class="numkey" onclick="pi('3')">3</button>
      <button class="numkey" onclick="pi('4')">4</button><button class="numkey" onclick="pi('5')">5</button><button class="numkey" onclick="pi('6')">6</button>
      <button class="numkey" onclick="pi('7')">7</button><button class="numkey" onclick="pi('8')">8</button><button class="numkey" onclick="pi('9')">9</button>
      <button class="numkey" onclick="pc()" style="color:var(--t3);font-size:14px">⌫</button>
      <button class="numkey" onclick="pi('0')">0</button>
      <button class="numkey" onclick="ps()" style="background:var(--blue);color:#000;font-weight:700">✓</button>
    </div>
    <div id="pin-err" style="font-size:11px;color:var(--red);height:16px"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading" style="display:none">
  <div style="font-size:11px;font-weight:700;letter-spacing:3px;color:var(--blue)">PF MONITOR</div>
  <div class="lbar-wrap"><div class="lbar" id="lbar" style="width:0%"></div></div>
  <div id="lstatus" style="font-size:11px;color:var(--t3);font-family:var(--mono)">초기화 중...</div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div class="hdr">
    <div class="logo"><span class="logo-dot"></span>아이 PF Monitor</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span id="upd" style="font-size:10px;color:var(--t3);font-family:var(--mono)"></span>
      <button class="rbtn" id="rbtn" onclick="runLoad()">🔄 새로고침</button>
    </div>
  </div>
  <div class="alerts" id="alerts"></div>
  <div class="summary" id="summary"></div>
  <div class="tbl-wrap">
    <div class="tbl-inner">
      <table>
        <thead><tr>
          <th>종목</th><th style="min-width:80px">섹터</th><th>현재가</th>
          <th>1주일</th><th>1개월</th><th>YTD</th><th>1년</th>
          <th>MA50</th><th>MA100</th><th>MA250</th>
          <th>일목구름</th><th>TK신호</th>
          <th>52주위치</th><th>위험도</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail -->
<div id="detail" class="detail">
  <div class="dh">
    <button class="back" onclick="closeDet()">← 목록</button>
    <span id="d-tk" style="font-size:19px;font-weight:700"></span>
    <span id="d-nm" style="font-size:11px;color:var(--t3)"></span>
    <span id="d-pr" style="font-size:16px;font-weight:700;font-family:var(--mono)"></span>
    <span id="d-ch" style="font-size:12px;font-family:var(--mono)"></span>
  </div>
  <div class="db">
    <div class="dchart">
      <div class="chart-box" id="chart-box"></div>
      <div class="legend">
        <div class="leg"><div class="leg-l" style="background:#58a6ff"></div>MA50</div>
        <div class="leg"><div class="leg-l" style="background:#d29922"></div>MA100</div>
        <div class="leg"><div class="leg-l" style="background:#f85149"></div>MA250</div>
        <div class="leg"><div class="leg-l" style="background:#bc8cff"></div>전환선</div>
        <div class="leg"><div class="leg-l" style="background:#fb923c"></div>기준선</div>
        <div class="leg"><div class="leg-l" style="background:rgba(0,210,100,.9)"></div>선행A(구름상단)</div>
        <div class="leg"><div class="leg-l" style="background:rgba(255,80,80,.9)"></div>선행B(구름하단)</div>
        <div class="leg"><div class="leg-a" style="background:rgba(80,200,120,.35);height:7px;border:1px solid rgba(0,210,100,.4)"></div>구름영역</div>
      </div>
    </div>
    <div class="dinfo" id="dinfo"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  ★ 설정 — 여기만 수정
// ═══════════════════════════════════════════════
const PIN = '1104';       // ← PIN 변경

const SECTORS = {
  NVDA:'반도체',GOOGL:'빅테크',IONQ:'양자컴퓨팅',AVGO:'반도체',
  LLY:'헬스케어',AMZN:'빅테크',KBWB:'금융',AOR:'혼합자산',
  BITO:'암호화폐',INTC:'반도체',CPNG:'이커머스',PLTR:'AI/데이터',
  'BRK-B':'금융','229200.KS':'국내주식','069500.KS':'국내주식','192090.KS':'해외주식',
};
const PORTFOLIO = [
  // 삼성증권 — 해외주식
  {t:'NVDA',  s:39,  n:'엔비디아',           acct:'삼성'},
  {t:'GOOGL', s:30,  n:'알파벳 A',           acct:'삼성'},
  {t:'IONQ',  s:55,  n:'아이온큐',           acct:'삼성'},
  {t:'AVGO',  s:11,  n:'브로드컴',           acct:'삼성'},
  {t:'LLY',   s:3,   n:'일라이 릴리',        acct:'삼성'},
  {t:'AMZN',  s:9,   n:'아마존',             acct:'삼성'},
  {t:'BRK-B', s:9,   n:'버크셔 B',           acct:'삼성'},
  {t:'PLTR',  s:10,  n:'팔란티어',           acct:'삼성'},
  {t:'CPNG',  s:100, n:'쿠팡',               acct:'삼성'},
  {t:'KBWB',  s:18,  n:'Invesco KBW Bank',  acct:'삼성'},
  {t:'AOR',   s:72,  n:'iShares Core Grw',  acct:'삼성'},
  {t:'BITO',  s:44,  n:'ProShares BTC ETF', acct:'삼성'},
  {t:'INTC',  s:15,  n:'인텔',               acct:'삼성'},
  // 삼성증권 — 국내 ETF (가격=KRW)
  {t:'229200.KS', s:227, n:'KODEX 코스닥150', acct:'삼성', krw:true},
  // 신한증권 — 국내 ETF (가격=KRW)
  {t:'069500.KS', s:243, n:'KODEX 200',       acct:'신한', krw:true},
  {t:'192090.KS', s:152, n:'TIGER 일본TOPIX', acct:'신한', krw:true},
];

const MAJOR_IB = ['JP Morgan','JPMorgan','Goldman Sachs','Morgan Stanley',
  'Barclays','UBS','Citigroup','Citi','Bank of America',
  'Deutsche Bank','Wells Fargo','HSBC','Jefferies','Evercore'];

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let FX = 1520;
const RES = {};
const COLS = ['#58a6ff','#3fb950','#bc8cff','#d29922','#f85149',
              '#39d353','#fb923c','#ec4899','#60a5fa','#34d399',
              '#a78bfa','#fbbf24','#f97316','#06b6d4','#84cc16','#e879f9'];
let lwChart = null;
const colMap = {};
PORTFOLIO.forEach((p,i)=>colMap[p.t]=COLS[i%COLS.length]);

// ═══════════════════════════════════════════════
//  PIN
// ═══════════════════════════════════════════════
let pv = '';
function pi(n){ if(pv.length>=4)return; pv+=n; ud(); if(pv.length===4)setTimeout(ps,150); }
function pc(){ pv=pv.slice(0,-1); ud(); document.getElementById('pin-err').textContent=''; }
function ud(){ document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pv.length)); }
function ps(){
  if(pv===PIN){
    sessionStorage.setItem('pf_ok','1');
    document.getElementById('pin-screen').style.display='none';
    boot();
  } else {
    document.getElementById('pin-err').textContent='❌ PIN이 틀렸습니다';
    pv=''; ud();
    const el=document.getElementById('pin-screen');
    el.style.animation='shake .3s'; setTimeout(()=>el.style.animation='',300);
  }
}
document.addEventListener('keydown',e=>{
  const ps2=document.getElementById('pin-screen');
  if(ps2.style.display==='none')return;
  if(e.key>='0'&&e.key<='9')pi(e.key);
  if(e.key==='Backspace')pc();
  if(e.key==='Enter')ps();
});
(function init(){
  if(sessionStorage.getItem('pf_ok')==='1'){
    document.getElementById('pin-screen').style.display='none';
    boot();
  }
})();

// ═══════════════════════════════════════════════
//  Fetch helpers
// ═══════════════════════════════════════════════
async function fx2(url, ms=9000){
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u=>u
  ];
  for(const mk of proxies){
    try{
      const c=new AbortController();
      const t=setTimeout(()=>c.abort(),ms);
      const r=await fetch(mk(url),{signal:c.signal});
      clearTimeout(t);
      const j=await r.json();
      return j.contents?JSON.parse(j.contents):j;
    }catch{}
  }
  return null;
}

async function loadFX(){
  const d=await fx2('https://open.er-api.com/v6/latest/USD',5000);
  if(d?.rates?.KRW) FX=d.rates.KRW;
}

// ═══════════════════════════════════════════════
//  Technical calculations
// ═══════════════════════════════════════════════
function sma(a,w){
  const o=new Array(a.length).fill(NaN);
  for(let i=w-1;i<a.length;i++){let s=0;for(let j=i-w+1;j<=i;j++)s+=a[j];o[i]=s/w;}
  return o;
}
function ichi(hi,lo){
  const n=hi.length,tn=new Array(n).fill(NaN),kj=new Array(n).fill(NaN);
  const sa=new Array(n).fill(NaN),sb=new Array(n).fill(NaN);
  for(let i=0;i<n;i++){
    if(i>=8){const h=Math.max(...hi.slice(i-8,i+1)),l=Math.min(...lo.slice(i-8,i+1));tn[i]=(h+l)/2;}
    if(i>=25){const h=Math.max(...hi.slice(i-25,i+1)),l=Math.min(...lo.slice(i-25,i+1));kj[i]=(h+l)/2;}
    const ti=Math.max(0,i-26);if(!isNaN(tn[ti])&&!isNaN(kj[ti]))sa[i]=(tn[ti]+kj[ti])/2;
    if(i>=51){const h=Math.max(...hi.slice(i-51,i+1)),l=Math.min(...lo.slice(i-51,i+1));sb[i]=(h+l)/2;}
  }
  return {tn,kj,sa,sb};
}
function cross(fv,sv,lb=10){
  const n=fv.length;
  for(let i=n-lb;i<n;i++){
    if(isNaN(fv[i-1])||isNaN(sv[i-1])||isNaN(fv[i])||isNaN(sv[i]))continue;
    if(fv[i-1]<sv[i-1]&&fv[i]>sv[i])return'golden';
    if(fv[i-1]>sv[i-1]&&fv[i]<sv[i])return'death';
  }return null;
}
function rsk(pr,m50,m100,m250,beta,h52,l52,vol){
  let s=50;
  if(!isNaN(beta))s+=Math.min(Math.max((beta-1)*12,-15),20);
  if(!isNaN(vol))s+=Math.min((vol-20)*.45,25);
  [m50,m100,m250].forEach(m=>{if(!isNaN(m))s+=pr<m?5:-2;});
  if(h52>l52)s+=((pr-l52)/(h52-l52)-.5)*20;
  return Math.max(0,Math.min(100,Math.round(s)));
}

// ═══════════════════════════════════════════════
//  Fetch single ticker
// ═══════════════════════════════════════════════
async function fetchTk(p){
  const url=`https://query2.finance.yahoo.com/v8/finance/chart/${p.t}?interval=1d&range=18mo`;
  const d=await fx2(url);
  if(!d?.chart?.result?.[0])return null;
  const r=d.chart.result[0];
  const ts=r.timestamp;
  const q=r.indicators.quote[0];
  const cl=q.close,hi=q.high,lo=q.low,op=q.open;
  if(!cl?.length)return null;

  const price=cl[cl.length-1],prev=cl[cl.length-2]||price;
  const m50v=sma(cl,50),m100v=sma(cl,100),m250v=sma(cl,250);
  const ma50=m50v[cl.length-1],ma100=m100v[cl.length-1],ma250=m250v[cl.length-1];
  const sig=m=>isNaN(m)?'x':(price/m-1)*100>3?'a':(price/m-1)*100<-3?'b':'n';
  const pct=m=>isNaN(m)?null:+((price/m-1)*100).toFixed(1);
  const c5100=cross(m50v,m100v),c5250=cross(m50v,m250v);
  const {tn,kj,sa,sb}=ichi(hi,lo);
  const n=cl.length;
  const ltn=tn[n-1],lkj=kj[n-1],lsa=sa[n-1],lsb=sb[n-1];
  const ctop=!isNaN(lsa)&&!isNaN(lsb)?Math.max(lsa,lsb):NaN;
  const cbot=!isNaN(lsa)&&!isNaN(lsb)?Math.min(lsa,lsb):NaN;
  const cp=isNaN(ctop)?'x':price>ctop?'a':price<cbot?'b':'i';
  const tk=(!isNaN(ltn)&&!isNaN(lkj))&&ltn>lkj?'bull':'bear';
  const h52=Math.max(...hi.filter(v=>v)),l52=Math.min(...lo.filter(v=>v));
  const rp=h52>l52?+((price-l52)/(h52-l52)*100).toFixed(1):50;
  const rets=cl.slice(1).map((v,i)=>cl[i]?((v-cl[i])/cl[i]):NaN).filter(v=>!isNaN(v));
  const avgR=rets.reduce((a,b)=>a+b,0)/rets.length;
  const vol=Math.sqrt(rets.reduce((a,b)=>a+(b-avgR)**2,0)/rets.length)*Math.sqrt(252)*100;
  const beta=r.meta?.beta||1.0;
  const rs=rsk(price,ma50,ma100,ma250,beta,h52,l52,vol);

  // Historical return helper
  function histPrice(daysBack){
    var targetTs = (Date.now()/1000) - daysBack*86400;
    var best=null, bestDiff=Infinity;
    for(var i=0;i<ts.length;i++){
      if(!cl[i]||isNaN(cl[i]))continue;
      var diff=Math.abs(ts[i]-targetTs);
      if(diff<bestDiff){bestDiff=diff;best=cl[i];}
    }
    return best;
  }
  function histRet(daysBack){
    var p=histPrice(daysBack);
    return p&&p>0 ? +((price-p)/p*100).toFixed(1) : null;
  }
  // 지난주(5거래일), 지난달말(고정날짜), YTD(작년말), 1년전
  var now=new Date();
  var wkRet  = histRet(7);
  var moRet  = histRet(30);
  // YTD: Dec 31, 2025
  var ytdTs  = new Date(now.getFullYear()-1,11,31).getTime()/1000;
  function ytdPrice(){
    var best=null,bestDiff=Infinity;
    for(var i=0;i<ts.length;i++){
      if(!cl[i]||isNaN(cl[i]))continue;
      var d=Math.abs(ts[i]-ytdTs);
      if(d<bestDiff){bestDiff=d;best=cl[i];}
    }
    return best;
  }
  var ytdP   = ytdPrice();
  var ytdRet = ytdP&&ytdP>0 ? +((price-ytdP)/ytdP*100).toFixed(1) : null;
  var y1Ret  = histRet(365);

  // Chart series (last 120)
  const sl=(arr)=>ts.slice(-120).map((t,j)=>{
    const v=arr[arr.length-120+j];
    return isNaN(v)?null:{time:t,value:+v.toFixed(4)};
  }).filter(Boolean);
  const ohlc=ts.slice(-120).map((t,j)=>{
    const i=cl.length-120+j;
    if(i<0||isNaN(cl[i]))return null;
    return{time:t,open:+op[i].toFixed(4),high:+hi[i].toFixed(4),
           low:+lo[i].toFixed(4),close:+cl[i].toFixed(4)};
  }).filter(Boolean);

  return{
    t:p.t,n:p.n,s:p.s,krw:p.krw||false,
    price:+price.toFixed(4),chg:+((price-prev)/prev*100).toFixed(2),
    rets:{wk:wkRet,mo:moRet,ytd:ytdRet,y1:y1Ret},
    ma:{v50:isNaN(ma50)?null:+ma50.toFixed(2),v100:isNaN(ma100)?null:+ma100.toFixed(2),
        v250:isNaN(ma250)?null:+ma250.toFixed(2),
        p50:pct(ma50),p100:pct(ma100),p250:pct(ma250),
        s50:sig(ma50),s100:sig(ma100),s250:sig(ma250),c5100,c5250},
    ichi:{tn:isNaN(ltn)?null:+ltn.toFixed(2),kj:isNaN(lkj)?null:+lkj.toFixed(2),
          sa:isNaN(lsa)?null:+lsa.toFixed(2),sb:isNaN(lsb)?null:+lsb.toFixed(2),cp,tk},
    lv:{h52:+h52.toFixed(2),l52:+l52.toFixed(2),
        vsH:+((price-h52)/h52*100).toFixed(1),rp},
    risk:{score:rs,beta:+(beta).toFixed(2),vol:+vol.toFixed(1)},
    chart:{ohlc,m50:sl(m50v),m100:sl(m100v),m250:sl(m250v),
           tn:sl(tn),kj:sl(kj),sa:sl(sa),sb:sl(sb)},
  };
}

// ═══════════════════════════════════════════════
//  Fetch detail data (lazy — on click)
// ═══════════════════════════════════════════════
async function fetchDetail(tk){
  const base=`https://query2.finance.yahoo.com/v10/finance/quoteSummary/${tk}`;

  // IB 등급변동 + 목표주가 + 어닝
  const [d1,d2]=await Promise.all([
    fx2(`${base}?modules=upgradeDowngradeHistory,financialData`,8000),
    fx2(`${base}?modules=calendarEvents`,6000),
  ]);

  let ibList=[],targets={},earn={};

  // IB
  try{
    const hist=d1?.quoteSummary?.result?.[0]?.upgradeDowngradeHistory?.history||[];
    const cut=Date.now()/1000-90*86400;
    ibList=hist.filter(x=>x.epochGradeDate>cut&&
      MAJOR_IB.some(ib=>x.firm?.toLowerCase().includes(ib.toLowerCase())))
      .slice(0,6).map(x=>({
        date:new Date(x.epochGradeDate*1000).toLocaleDateString('ko-KR'),
        firm:x.firm,from:x.fromGrade,to:x.toGrade,
        act:x.action==='up'?'up':x.action==='down'?'dn':'mt'
      }));
  }catch{}

  // 목표주가
  try{
    const fd=d1?.quoteSummary?.result?.[0]?.financialData||{};
    if(fd.targetMeanPrice?.raw){
      targets={mean:fd.targetMeanPrice.raw,high:fd.targetHighPrice?.raw,
               low:fd.targetLowPrice?.raw,cur:RES[tk]?.price};
    }
  }catch{}

  // 어닝
  try{
    const ce=d2?.quoteSummary?.result?.[0]?.calendarEvents?.earnings||{};
    if(ce.earningsDate?.[0]?.raw){
      earn={
        date:new Date(ce.earningsDate[0].raw*1000).toLocaleDateString('ko-KR'),
        avg:ce.earningsAverage?.raw,low:ce.earningsLow?.raw,high:ce.earningsHigh?.raw
      };
    }
  }catch{}

  // 뉴스
  let news=[];
  try{
    const nd=await fx2(`https://query2.finance.yahoo.com/v1/finance/search?q=${tk}&quotesCount=0&newsCount=5`,6000);
    if(nd?.news) news=nd.news.slice(0,4).map(x=>({
      title:x.title,link:x.link,pub:x.publisher,
      date:x.providerPublishTime?new Date(x.providerPublishTime*1000).toLocaleDateString('ko-KR'):''
    }));
  }catch{}

  return{ibList,targets,earn,news};
}

async function runLoad(){

  setL(0,'환율 조회 중...');

  for(let i=0;i<tot;i+=4){
    const batch=PORTFOLIO.slice(i,i+4);
    await Promise.all(batch.map(async p=>{
      setL(Math.round(done/tot*90),`${p.n} 조회 중...`);

// ── Chart ──────────────────────────────────
function buildChart(r,col){
  const box=document.getElementById('chart-box');
  box.innerHTML='';
  if(lwChart){lwChart.remove();lwChart=null;}

  const cw=box.getBoundingClientRect().width||window.innerWidth-340;
  lwChart=LightweightCharts.createChart(box,{
    width:Math.max(cw,280),height:400,
    layout:{background:{color:'#0d1117'},textColor:'#8b949e'},
    grid:{vertLines:{color:'#1c2230'},horzLines:{color:'#1c2230'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1c2230'},
    timeScale:{borderColor:'#1c2230',timeVisible:true},
  });

  const ch=r.chart;

  // Ichimoku cloud — SA area (top half)
  // Ichimoku Cloud — SA와 SB 사이를 채워서 구름 표현
  if(ch.sa?.length && ch.sb?.length){
    // 구름 위쪽 경계 (SA) - 초록 라인
    const saS=lwChart.addLineSeries({
      color:'rgba(0,210,100,0.85)', lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Solid,
      priceLineVisible:false, crosshairMarkerVisible:false, lastValueVisible:false,
    });
    saS.setData(ch.sa);
    // 구름 아래쪽 경계 (SB) - 빨간 라인
    const sbS=lwChart.addLineSeries({
      color:'rgba(255,80,80,0.85)', lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Solid,
      priceLineVisible:false, crosshairMarkerVisible:false, lastValueVisible:false,
    });
    sbS.setData(ch.sb);
    // SA 기준 fill (구름 본체 — 위쪽을 채워서 구름 느낌)
    const cloudFill=lwChart.addAreaSeries({
      lineColor:'rgba(0,0,0,0)', lineWidth:0,
      topColor:'rgba(80,200,120,0.28)',
      bottomColor:'rgba(255,100,100,0.18)',
      priceLineVisible:false, crosshairMarkerVisible:false, lastValueVisible:false,
    });
    // Use SA for the area top
    cloudFill.setData(ch.sa);
  }

  // Candlestick
  const cs=lwChart.addCandlestickSeries({
    upColor:'#3fb950',downColor:'#f85149',
    borderUpColor:'#3fb950',borderDownColor:'#f85149',
    wickUpColor:'#3fb950',wickDownColor:'#f85149',
  });
  if(ch.ohlc?.length)cs.setData(ch.ohlc);

  // MAs
  [{k:'m50',c:'#58a6ff',w:1.5},{k:'m100',c:'#d29922',w:1.5},{k:'m250',c:'#f85149',w:2}]
    .forEach(cfg=>{
      if(!ch[cfg.k]?.length)return;
      lwChart.addLineSeries({color:cfg.c,lineWidth:cfg.w,
        priceLineVisible:false,crosshairMarkerVisible:false,lastValueVisible:true})
        .setData(ch[cfg.k]);
    });

  // Ichimoku lines
  [{k:'tn',c:'#bc8cff'},{k:'kj',c:'#fb923c'}].forEach(cfg=>{
    if(!ch[cfg.k]?.length)return;
    lwChart.addLineSeries({color:cfg.c,lineWidth:1,
      lineStyle:LightweightCharts.LineStyle.Dashed,
      priceLineVisible:false,lastValueVisible:false})
      .setData(ch[cfg.k]);
  });

  lwChart.timeScale().fitContent();
  window.onresize=()=>{ if(lwChart){ const w=box.getBoundingClientRect().width||window.innerWidth-340; lwChart.resize(Math.max(w,280),400); } };
}

// ── Static signal cards ─────────────────────
function buildInfoStatic(r){
  var ma=r.ma, ic=r.ichi, lv=r.lv, rk=r.risk;
  var cloudTxt={a:'\u2191 \uad6c\ub984 \uc704 (\uac15\uc138)',i:'\u2248 \uad6c\ub984 \ub0b4 (\uc911\ub9bd)',b:'\u2193 \uad6c\ub984 \uc544\ub798 (\uc57d\uc138)',x:'?'};
  var cloudCol={a:'var(--green)',i:'var(--amber)',b:'var(--red)',x:'var(--t3)'};
  function sigC(s){ return s==='a'?'var(--green)':s==='b'?'var(--red)':'var(--amber)'; }
  function pStr(p){ return p!=null?(p>0?'+':'')+p+'%':'N/A'; }
  function cHtml(crs){
    if(!crs) return '<span style="color:var(--t3)">\u2014</span>';
    return '<span style="color:'+(crs==='golden'?'var(--green)':'var(--red)')+'">'+
      (crs==='golden'?'\ud83d\udd06 \uace8\ub4e0\ud06c\ub85c\uc2a4':'\ud83d\udc80 \ub370\ub4dc\ud06c\ub85c\uc2a4')+'</span>';
  }
  function card(lbl,col,val,sub){
    return '<div class="scard"><div class="cardlbl">'+lbl+'</div>'+
      '<div class="cardval" style="color:'+col+'">'+val+'</div>'+
      (sub?'<div style="font-size:9.5px;color:var(--t3);font-family:var(--mono)">'+sub+'</div>':'')+
      '</div>';
  }
  var h='';
  h+='<div class="dsec">\uc77c\ubaa9\uade0\ud615\ud45c</div>';
  h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:4px">';
  h+='<div style="font-size:14px;font-weight:600;color:'+cloudCol[ic.cp]+'">'+cloudTxt[ic.cp]+'</div>';
  h+='<div style="font-size:10.5px;color:'+(ic.tk==='bull'?'var(--green)':'var(--red)')+';font-family:var(--mono);margin-top:3px">';
  h+='\uc804\ud658\uc120 '+(ic.tk==='bull'?'>':'<')+' \uae30\uc900\uc120 ('+(ic.tk==='bull'?'\uac15\uc138':'\uc57d\uc138')+')';
  if(ic.tn) h+=' \u00b7 \uc804\ud658 '+(r.krw?'\u20a9'+Math.round(ic.tn).toLocaleString('ko'):'$'+ic.tn);
  if(ic.kj) h+=' / \uae30\uc900 '+(r.krw?'\u20a9'+Math.round(ic.kj).toLocaleString('ko'):'$'+ic.kj);
  h+='</div></div>';
  h+='<div class="dsec">\uc774\ub3d9\ud3c9\uade0</div><div class="sgrid">';
  h+=card('MA50 \ub300\ube44', sigC(ma.s50),  pStr(ma.p50));
  h+=card('MA100 \ub300\ube44',sigC(ma.s100), pStr(ma.p100));
  h+=card('MA250 \ub300\ube44',sigC(ma.s250), pStr(ma.p250));
  h+=card('52\uc8fc \uc704\uce58', lv.rp>80?'var(--amber)':lv.rp<20?'var(--blue)':'var(--t1)', lv.rp+'%', 'ATH\u6bd4 '+lv.vsH+'%');
  h+='<div class="scard"><div class="cardlbl">MA \uad50\ucc28 50/100</div><div style="margin-top:3px;font-size:11px">'+cHtml(ma.c5100)+'</div></div>';
  h+='<div class="scard"><div class="cardlbl">MA \uad50\ucc28 50/250</div><div style="margin-top:3px;font-size:11px">'+cHtml(ma.c5250)+'</div></div>';
  h+='</div>';
  h+='<div class="dsec">\ub9ac\uc2a4\ud06c</div><div class="sgrid">';
  h+=card('\uc704\ud5d8\ub3c4', rk.score>=70?'var(--red)':rk.score>=45?'var(--amber)':'var(--green)', rk.score+'/100');
  h+='<div class="scard"><div class="cardlbl">\ubca0\ud0c0 / \uc5f0\ubcc0\ub3d9\uc131</div>';
  h+='<div style="font-family:var(--mono);font-size:10.5px;color:var(--t2);line-height:1.8;margin-top:2px">\u03b2 '+rk.beta+'<br>\u03c3 '+rk.vol+'%</div></div></div>';
  h+='<div class="dsec">\uc5b4\ub2dd / \ubaa9\ud45c\uc8fc\uac00 / IB \ub3d9\ud5a5</div>';
  h+='<div id="det-async" style="display:flex;align-items:center;gap:8px;color:var(--t3);font-size:11px;padding:8px 0"><span class="spinner"></span> \ub370\uc774\ud130 \ub85c\ub529 \uc911...</div>';
  h+='<div class="dsec">\ucd5c\uc2e0 \ub274\uc2a4</div>';
  h+='<div id="det-news" style="display:flex;align-items:center;gap:8px;color:var(--t3);font-size:11px;padding:8px 0"><span class="spinner"></span> \ub274\uc2a4 \ubd88\ub7ec\uc624\ub294 \uc911...</div>';
  document.getElementById('dinfo').innerHTML=h;
}

// ── Async: earnings + IB + news ────────────
async function loadDetailAsync(tk){
  const r=RES[tk];
  const det=await fetchDetail(tk);

  // Earnings + Target + IB
  let asyncHtml='';

  // 어닝
  if(det.earn?.date){
    asyncHtml+=`<div class="earn-box">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">📅 다음 어닝 발표</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:3px">${det.earn.date}</div>
      ${det.earn.avg!=null?`<div style="font-size:10.5px;color:var(--t2);font-family:var(--mono)">EPS 컨센서스: $${det.earn.avg} (범위 $${det.earn.low} ~ $${det.earn.high})</div>`:''}
    </div>`;
  } else {
    asyncHtml+=`<div style="font-size:11px;color:var(--t3);margin-bottom:10px">어닝 일정 데이터 없음</div>`;
  }

  // 목표주가
  if(det.targets?.mean){
    const cur=det.targets.cur||r.price;
    const up=((det.targets.mean-cur)/cur*100).toFixed(1);
    const pct=det.targets.high>det.targets.low?
      Math.min(Math.max((cur-det.targets.low)/(det.targets.high-det.targets.low)*100,0),100):50;
    asyncHtml+=`<div class="earn-box">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">🎯 컨센서스 목표주가</div>
      <div style="font-size:13px;font-weight:600">$${det.targets.mean.toFixed(2)}
        <span style="font-size:11px;color:${up>=0?'var(--green)':'var(--red)'}"> ${up>=0?'+':''}${up}%</span>
      </div>
      <div class="tgt-track">
        <div class="tgt-fill" style="width:100%"></div>
        <div class="tgt-mark" style="left:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--t3);font-family:var(--mono)">
        <span>$${det.targets.low?.toFixed(2)||'—'}</span>
        <span>현재 $${cur.toFixed(2)}</span>
        <span>$${det.targets.high?.toFixed(2)||'—'}</span>
      </div>
    </div>`;
  }

  // IB 등급변동
  if(det.ibList?.length){
    asyncHtml+=`<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">🏦 IB 등급변동 (90일)</div>`;
    asyncHtml+=det.ibList.map(x=>`
      <div class="ib-row ${x.act}">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="font-weight:700;font-size:12px">${x.firm}</span>
          <span style="font-size:9.5px;color:var(--t3)">${x.date}</span>
        </div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:2px">
          ${x.act==='up'?'⬆':x.act==='dn'?'⬇':'→'} ${x.from||'—'} → ${x.to||'—'}
        </div>
      </div>`).join('');
  } else {
    asyncHtml+=`<div style="font-size:11px;color:var(--t3);margin-bottom:8px">90일 내 주요 IB 등급변동 없음</div>`;
  }

  const aEl=document.getElementById('det-async');
  if(aEl)aEl.innerHTML=asyncHtml;

  // 뉴스
  const nEl=document.getElementById('det-news');
  if(nEl){
    if(det.news?.length){
      nEl.innerHTML=det.news.map((n,i)=>`
        <a class="news-a" href="${n.link}" target="_blank">
          <div class="ntitle">${i===0?'🔥 ':''}${n.title}</div>
          <div class="nmeta">${n.pub||''} · ${n.date||''}</div>
        </a>`).join('');
    } else {
      nEl.innerHTML='<span style="color:var(--t3);font-size:11px">뉴스 없음</span>';
    }
  }
}
</script>
