name: ELS 모니터링 알람

on:
  schedule:
    - cron: '30 21 * * *'
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  els-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy requests
      - run: pip install --upgrade git+https://github.com/rongardF/tvdatafeed.git
      - name: ELS 알람 실행
        env:
          BOT_TOKEN: ${{ secrets.ELS_BOT_TOKEN }}
          ELS_CHAT_ID: ${{ secrets.CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: python els_monitor.py
