name: 아이 PF 모닝 알람

on: 
  schedule:
    # 매일 오전 7시 KST = UTC 21:30 (전날)
    - cron: '30 21 * * *'
  # 수동 실행 (테스트용)
  workflow_dispatch:

jobs:
  morning-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance pandas numpy requests

      - name: 모닝 알람 실행
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python alert_bot.py
